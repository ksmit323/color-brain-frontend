name: Deploy landing
on:
  push:
    branches: [main]
    paths: ["landing/**", ".github/workflows/deploy-landing.yml"]
  workflow_dispatch:
permissions:
  id-token: write
  contents: read
concurrency:
  group: deploy-landing
  cancel-in-progress: true
env:
  AWS_REGION: ap-southeast-2
jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: landing/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      # Two-pass sync so hashed assets get long-lived cache headers without a
      # follow-up `s3 cp --metadata-directive REPLACE`, which drops Content-Type
      # and serves CSS/JS as binary/octet-stream (browsers refuse to apply them).
      - name: Upload HTML and public assets
        run: >
          aws s3 sync dist "s3://${{ vars.LANDING_S3_BUCKET }}"
          --delete
          --exclude "_astro/*"
          --cache-control "public,max-age=0,must-revalidate"
      - name: Upload hashed _astro assets
        run: >
          aws s3 sync dist/_astro "s3://${{ vars.LANDING_S3_BUCKET }}/_astro"
          --delete
          --cache-control "public,max-age=31536000,immutable"
      - run: aws cloudfront create-invalidation --distribution-id "${{ vars.LANDING_CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
